services:
  - type: web
    name: ai-freelancer-assistant
    env: python
    buildCommand: |
      pip install -r requirements.txt
      python manage.py collectstatic --noinput
      python manage.py migrate
    startCommand: gunicorn ai_freelancer_assistant.wsgi:application
    envVars:
      - key: ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: GEMINI_API_KEY
        sync: false
      - key: ALLOWED_HOSTS
        value: your-app-name.onrender.com
    plan: free