{% extends 'base.html' %}
{% block title %}Edit Cover Letter - AI Freelancer Assistant{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="row">
        <div class="col-12">
            <h1 class="mb-4">Edit Cover Letter</h1>
        </div>
    </div>
    
    <div class="row">
        <div class="col-md-8">
            <div class="card">
                <div class="card-body">
                    <form method="POST" action="{% url 'coverletter_edit' coverletter.pk %}">
                        {% csrf_token %}
                        
                        <div class="mb-3">
                            <label for="job_title" class="form-label">Job Title *</label>
                            <input type="text" name="job_title" class="form-control" id="job_title" value="{{ coverletter.job_title }}" required>
                        </div>
                        
                        <div class="mb-3">
                            <label for="company_name" class="form-label">Company Name *</label>
                            <input type="text" name="company_name" class="form-control" id="company_name" value="{{ coverletter.company_name }}" required>
                        </div>
                        
                        <div class="mb-3">
                            <label for="experience" class="form-label">Your Experience *</label>
                            <textarea name="experience" class="form-control" id="experience" rows="3" required>{{ coverletter.experience }}</textarea>
                        </div>
                        
                        <div class="mb-3">
                            <label for="skills" class="form-label">Skills (comma separated) *</label>
                            <input type="text" name="skills" class="form-control" id="skills" value="{{ coverletter.skills }}" required>
                        </div>
                        
                        <div class="mb-3">
                            <label for="portfolio_url" class="form-label">Portfolio URL</label>
                            <input type="url" name="portfolio_url" class="form-control" id="portfolio_url" value="{{ coverletter.portfolio_url|default:'' }}">
                        </div>
                        
                        <div class="mb-3">
                            <label for="tone" class="form-label">Tone</label>
                            <select name="tone" class="form-select" id="tone">
                                <option value="professional" {% if coverletter.tone == 'professional' %}selected{% endif %}>Professional</option>
                                <option value="enthusiastic" {% if coverletter.tone == 'enthusiastic' %}selected{% endif %}>Enthusiastic</option>
                                <option value="confident" {% if coverletter.tone == 'confident' %}selected{% endif %}>Confident</option>
                                <option value="humble" {% if coverletter.tone == 'humble' %}selected{% endif %}>Humble</option>
                            </select>
                        </div>
                        
                        <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                            <a href="{% url 'coverletter_detail' coverletter.pk %}" class="btn btn-secondary">Cancel</a>
                            <button type="submit" class="btn btn-primary">Update Cover Letter</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
        
        <div class="col-md-4">
            <div class="card">
                <div class="card-header bg-info text-white">
                    <h5 class="mb-0"><i class="fas fa-lightbulb"></i> Tips</h5>
                </div>
                <div class="card-body">
                    <ul class="list-unstyled">
                        <li class="mb-2"><i class="fas fa-check text-success"></i> Update job details</li>
                        <li class="mb-2"><i class="fas fa-check text-success"></i> Modify experience description</li>
                        <li class="mb-2"><i class="fas fa-check text-success"></i> Add or remove skills</li>
                        <li class="mb-2"><i class="fas fa-check text-success"></i> Update portfolio URL</li>
                    </ul>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
