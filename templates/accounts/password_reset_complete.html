{% extends 'base.html' %}
{% block title %}Password Reset Complete - AI Freelancer Assistant{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header bg-success text-white">
                    <h4 class="mb-0"><i class="fas fa-check-circle"></i> Password Reset Complete</h4>
                </div>
                <div class="card-body text-center">
                    <i class="fas fa-check-circle fa-3x text-success mb-3"></i>
                    <p>Your password has been set. You can now log in with your new password.</p>
                    <a href="{% url 'login' %}" class="btn btn-success">Login Now</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
