{% extends 'base.html' %}
{% block title %}Reset Password - AI Freelancer Assistant{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header bg-warning text-dark">
                    <h4 class="mb-0"><i class="fas fa-key"></i> Reset Password</h4>
                </div>
                <div class="card-body">
                    <p>Enter your email address and we'll send you a link to reset your password.</p>
                    <form method="POST">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label for="email" class="form-label">Email</label>
                            <input type="email" name="email" class="form-control" id="email" required>
                        </div>
                        <div class="d-grid">
                            <button type="submit" class="btn btn-warning">Send Reset Link</button>
                        </div>
                    </form>
                    <div class="mt-3 text-center">
                        <p><a href="{% url 'login' %}">Back to Login</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
