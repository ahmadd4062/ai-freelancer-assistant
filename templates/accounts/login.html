{% extends 'base.html' %}
{% block title %}Login - AI Freelancer Assistant{% endblock %}

{% block content %}
<style>
    .login-card {
        border: none;
        border-radius: 12px;
        box-shadow: 0 8px 30px rgba(0,0,0,0.08);
        overflow: hidden;
    }
    .login-card .card-header {
        background: linear-gradient(135deg, #4a90e2, #667eea);
        border: none;
        padding: 1.25rem 1.5rem;
    }
    .login-card .card-header h4 {
        font-weight: 600;
        letter-spacing: 0.3px;
    }
    .login-card .card-body {
        padding: 2rem;
    }
    .login-card .form-control {
        border-radius: 8px;
        padding: 0.6rem 1rem;
        border: 1.5px solid #e9ecef;
        transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }
    .login-card .form-control:focus {
        border-color: #4a90e2;
        box-shadow: 0 0 0 0.2rem rgba(74, 144, 226, 0.15);
    }
    .login-card .form-label {
        font-weight: 500;
        color: #2c3e50;
    }
    .login-card .btn-login {
        padding: 0.6rem;
        font-weight: 600;
        border-radius: 8px;
        background: linear-gradient(135deg, #4a90e2, #667eea);
        border: none;
        transition: transform 0.15s ease, box-shadow 0.15s ease;
    }
    .login-card .btn-login:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(74, 144, 226, 0.3);
    }
    .login-card .btn-login i {
        margin-right: 0.5rem;
    }
    .login-card .links {
        margin-top: 1.5rem;
        padding-top: 1rem;
        border-top: 1px solid #f1f3f5;
    }
    .login-card .links a {
        color: #4a90e2;
        text-decoration: none;
        font-weight: 500;
        transition: color 0.15s ease;
    }
    .login-card .links a:hover {
        color: #2c3e50;
        text-decoration: underline;
    }
    .login-card .links p {
        margin-bottom: 0.3rem;
        color: #6c757d;
    }
    .register-link {
        color: #28a745 !important;
    }
    .register-link:hover {
        color: #1e7e34 !important;
    }
</style>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card login-card">
                <div class="card-header text-white text-center">
                    <h4 class="mb-0"><i class="fas fa-robot me-2"></i>AI Freelancer</h4>
                    <p class="mb-0" style="font-size: 0.9rem; opacity: 0.8;">Sign in to your account</p>
                </div>
                <div class="card-body">
                    <form method="POST">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label for="username" class="form-label"><i class="fas fa-user me-1"></i>Username</label>
                            <input type="text" name="username" class="form-control" id="username" placeholder="Enter your username" required autofocus>
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label"><i class="fas fa-lock me-1"></i>Password</label>
                            <input type="password" name="password" class="form-control" id="password" placeholder="Enter your password" required>
                        </div>
                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary btn-login">
                                <i class="fas fa-sign-in-alt"></i> Login
                            </button>
                        </div>
                    </form>
                    
                    <div class="links text-center">
                        <p><a href="{% url 'password_reset' %}"><i class="fas fa-key me-1"></i>Forgot Password?</a></p>
                        <p>Don't have an account? <a href="{% url 'register' %}" class="register-link"><i class="fas fa-user-plus me-1"></i>Register here</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
